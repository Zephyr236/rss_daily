name: RSS Daily Report Generator

on:
  schedule:
    # 每天北京时间上午9点执行 (UTC+8 = UTC-8小时)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest
    environment: INFO
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync
        
    - name: Create required directories
      run: |
        mkdir -p rss generated_reports daily_reports
        
    - name: Run RSS Daily Report Generator
      env:
        PYTHONUNBUFFERED: 1
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        TO_EMAILS: ${{ secrets.TO_EMAILS }}
        PASS: ${{ secrets.PASS }}
        
      run: |
        unzip -P $PASS rss.zip
        uv run main.py > /dev/null
        
    # - name: generated reports save
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: reports
    #     path: generated_reports
